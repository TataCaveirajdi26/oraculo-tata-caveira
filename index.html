<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oráculo do Tatá Caveira</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #d4d4d4;
            font-family: 'Garamond', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            background: #151515;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #333;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }
        h1 { color: #b30000; text-align: center; font-size: 1.8rem; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }
        label { display: block; margin-top: 10px; font-size: 0.8rem; color: #777; text-transform: uppercase; }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 5px 0 15px 0;
            background: #202020;
            border: 1px solid #333;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
        }
        input:focus, textarea:focus { border-color: #b30000; }
        .cards-area {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }
        .card {
            width: 65px;
            height: 95px;
            background: #1a1a1a;
            border: 2px solid #b30000;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #b30000;
            transition: 0.4s ease;
        }
        .card.selected { 
            background: #b30000; 
            color: gold; 
            transform: translateY(-15px); 
            border-color: gold;
            box-shadow: 0 5px 15px rgba(179, 0, 0, 0.6);
        }
        
        #btn-revelar {
            width: 100%;
            padding: 18px;
            background: #4a0000;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            margin-top: 10px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        #btn-revelar:hover { background: #8b0000; box-shadow: 0 0 15px #b30000; }

        #resultado {
            margin-top: 25px;
            padding: 20px;
            background: #000;
            border: 1px dashed #b30000;
            display: none;
            animation: fadeIn 1s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #444;
            text-align: center;
            border-top: 1px solid #222;
            padding-top: 20px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>💀 Oráculo do Tatá Caveira</h1>
    
    <label>Nome Completo:</label>
    <input type="text" id="nome" placeholder="Digite seu nome...">
    
    <label>Data de Nascimento:</label>
    <input type="date" id="dataNasc">
    
    <label>Sua Pergunta ao Oráculo:</label>
    <textarea id="pergunta" rows="2" placeholder="Ex: Vou conseguir meu objetivo?"></textarea>

    <p style="text-align: center; font-size: 0.9rem; color: #888;">Mentalize sua dúvida e escolha 3 números:</p>
    <div class="cards-area">
        <div class="card" onclick="selectCard(this)">1</div>
        <div class="card" onclick="selectCard(this)">2</div>
        <div class="card" onclick="selectCard(this)">3</div>
        <div class="card" onclick="selectCard(this)">4</div>
        <div class="card" onclick="selectCard(this)">5</div>
    </div>

    <button id="btn-revelar" onclick="revelarDestino()">REVELAR RESPOSTA ESPIRITUAL</button>

    <div id="resultado">
        <strong id="res-nome" style="color: gold; display: block; margin-bottom: 10px; font-size: 1.1rem;"></strong>
        <p id="res-texto" style="font-style: italic; color: #fff;"></p>
    </div>
</div>

<footer>
    Criado e desenvolvido por Daniel Almeida
</footer>

<script>
    let cartasSelecionadas = 0;

    function selectCard(element) {
        if (!element.classList.contains('selected') && cartasSelecionadas < 3) {
            element.classList.add('selected');
            cartasSelecionadas++;
        }
    }
