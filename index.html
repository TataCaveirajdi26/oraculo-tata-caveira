<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oráculo do Tatá Caveira</title>
    <style>
        body { background-color: #0a0a0a; color: #d4d4d4; font-family: 'Garamond', serif; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; margin: 0; }
        .container { max-width: 450px; width: 90%; background: #151515; padding: 25px; border-radius: 10px; border: 1px solid #333; box-shadow: 0 0 30px rgba(0, 0, 0, 0.8); margin-top: 20px; }
        h1 { color: #b30000; text-align: center; font-size: 1.6rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        label { display: block; margin-top: 10px; font-size: 0.8rem; color: #888; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 12px; margin: 5px 0 15px 0; background: #202020; border: 1px solid #333; color: white; border-radius: 4px; box-sizing: border-box; outline: none; font-size: 1rem; }
        input:focus, textarea:focus { border-color: #b30000; }
        
        .cards-area { display: flex; justify-content: space-between; margin: 25px 0; gap: 5px; }
        .card {
            width: 18%; height: 80px; background: #1a1a1a; border: 2px solid #444; border-radius: 5px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: bold; color: #555; transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }
        /* Estilo da carta quando selecionada */
        .card.selected { 
            background: #4a0000 !important; 
            color: #ffd700 !important; 
            border: 2px solid #ffd700 !important;
            transform: translateY(-10px);
            box-shadow: 0 5px 15px rgba(179, 0, 0, 0.8);
        }

        #btn-revelar {
            width: 100%; padding: 18px; background: #b30000; color: white; border: none;
            cursor: pointer; font-weight: bold; letter-spacing: 1px; margin-top: 10px;
            text-transform: uppercase; border-radius: 4px; font-size: 1rem;
        }
        #btn-revelar:hover { background: #e60000; }

        #resultado { margin-top: 25px; padding: 20px; background: #000; border: 1px solid #b30000; display: none; border-radius: 5px; }
        footer { margin-top: 50px; font-size: 0.8rem; color: #666; text-align: center; border-top: 1px solid #222; padding: 20px 0; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h1>💀 Oráculo do Tatá Caveira</h1>
    
    <label>Nome Completo:</label>
    <input type="text" id="nome" placeholder="Seu nome...">
    
    <label>Data de Nascimento:</label>
    <input type="date" id="dataNasc">
    
    <label>Pergunta Curta:</label>
    <textarea id="pergunta" rows="2" placeholder="Ex: Terei sucesso?"></textarea>

    <p style="text-align: center; font-size: 0.85rem; color: #aaa;">Escolha 3 números para consultar:</p>
    <div class="cards-area">
        <div class="card" onclick="toggleCard(this)">1</div>
        <div class="card" onclick="toggleCard(this)">2</div>
        <div class="card" onclick="toggleCard(this)">3</div>
        <div class="card" onclick="toggleCard(this)">4</div>
        <div class="card" onclick="toggleCard(this)">5</div>
    </div>

    <button id="btn-revelar" onclick="gerarResposta()">CONSULTAR MISTÉRIOS</button>

    <div id="resultado">
        <strong id="res-nome" style="color: #ffd700; display: block; margin-bottom: 10px;"></strong>
        <p id="res-texto" style="line-height: 1.5; color: #efefef; margin: 0;"></p>
    </div>
</div>

<footer>
    Criado e desenvolvido por Daniel Almeida
</footer>

<script>
    let selecionadas = 0;

    function toggleCard(el) {
        if (el.classList.contains('selected')) {
            el.classList.remove('selected');
            selecionadas--;
        } else {
            if (selecionadas < 3) {
                el.classList.add('selected');
                selecionadas++;
            } else {
                alert("Você já escolheu as 3 cartas!");
            }
        }
    }

    function gerarResposta() {
        const nome = document.getElementById('nome').value;
        const perg = document.getElementById('pergunta').value.toLowerCase();

        if (!nome || !perg || selecionadas < 3) {
            alert("Por favor, preencha os dados e selecione 3 números.");
            return;
        }

        let msg = "";
        
        // Temas de resposta com nexo
        if (perg.includes("amor") || perg.includes("namoro") || perg.includes("ele") || perg.includes("ela")) {
            const r = [
                "Tatá Caveira avisa: o amor exige que você enterre o que já morreu para o novo florescer.",
                "Caminhos abertos no afeto, mas cuidado com o ciúme. A confiança é a base do seu trono.",
                "Alguém do passado pensa em você, mas a espiritualidade pede que você olhe apenas para frente."
            ];
            msg = r[Math.floor(Math.random() * r.length)];
        } else if (perg.includes("trabalho") || perg.includes("dinheiro") || perg.includes("emprego")) {
            const r = [
                "A prosperidade vem pela estratégia. Não fale dos seus ganhos para quem não planta com você.",
                "Portas se abrindo no campo material. Tatá Caveira indica uma notícia positiva em breve.",
                "Cuidado com gastos impulsivos. O equilíbrio financeiro será sua maior vitória este mês."
            ];
            msg = r[Math.floor(Math.random() * r.length)];
        } else if (perg.includes("inveja") || perg.includes("inimigo") || perg.includes("mal")) {
            const r = [
                "Você está protegido sob a capa de Tatá Caveira. O que jogarem contra você voltará para o pó.",
                "O silêncio é sua melhor defesa. Afaste-se de conversas vazias e sua energia será preservada.",
                "Inimigo oculto sendo revelado. Fique atento aos sinais, a verdade aparecerá em 7 dias."
            ];
            msg = r[Math.floor(Math.random() * r.length)];
        } else {
            const r = [
                "Os mistérios dizem que a resposta está no seu equilíbrio. Aguarde o tempo da espiritualidade.",
                "O que parece um obstáculo hoje é, na verdade, um livramento. Siga com fé.",
                "Sua resposta é positiva, mas exige que você tome uma decisão que vem adiando.",
                "Tatá Caveira diz: a terra tudo provê. Plante boas ações e a colheita será farta.",
                "Não apresse o destino. Tudo chegará no momento em que você estiver pronto para receber."
            ];
            msg = r[Math.floor(Math.random() * r.length)];
        }

        document.getElementById('res-nome').innerText = `Mensagem para ${nome}:`;
        document.getElementById('res-texto').innerText = msg;
        document.getElementById('resultado').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
